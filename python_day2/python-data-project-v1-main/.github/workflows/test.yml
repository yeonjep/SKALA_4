name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLCONFIGDIR: ${{ runner.temp }}/matplotlib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -m py_compile src/main.py src/phase1.py src/phase2.py src/phase3.py src/phase4.py src/report/generate_report.py

      - name: Check imports
        run: |
          PYTHONPATH=src python -c "import main; import report.generate_report"

      - name: Generate report with sample runtime results
        run: |
          mkdir -p output
          printf "sample png placeholder" > output/seaborn_distribution.png
          printf "<html><body>sample plotly chart</body></html>" > output/plotly_group_comparison.html
          PYTHONPATH=src python - <<'PY'
          from pathlib import Path

          import pandas as pd

          from report.generate_report import generate_report

          sample_df = pd.DataFrame(
              {
                  "fare_amount": [12.5, 18.0, 24.5],
                  "trip_distance": [1.2, 2.8, 4.1],
                  "passenger_count": [1, 2, 1],
              }
          )
          stats_results = {
              "corr_coefficient": 0.91,
              "t_statistic": -2.45,
              "p_value": 0.014,
              "interpretation": "p-value가 0.05보다 작으므로 통계적으로 유의미합니다.",
              "short_mean": 10.2,
              "long_mean": 21.4,
          }
          ml_results = {
              "accuracy": 0.82,
              "f1": 0.79,
              "precision": 0.81,
              "recall": 0.77,
              "n_train": 120,
              "n_test": 30,
              "top_features": [
                  {"feature": "num__fare_amount", "importance": 0.42},
                  {"feature": "num__trip_distance", "importance": 0.31},
              ],
          }

          generate_report(
              data_frame=sample_df,
              stats_results=stats_results,
              ml_results=ml_results,
              command="ci smoke test",
          )

          report = Path("report.md").read_text(encoding="utf-8")
          required_text = [
              "NYC Yellow Taxi Trip Data 2026-05",
              "output/seaborn_distribution.png",
              "output/plotly_group_comparison.html",
              "trip_distance_vs_fare_amount",
              "0.014",
              "RandomForestClassifier",
              "num__fare_amount",
          ]
          for text in required_text:
              assert text in report, f"missing expected report text: {text}"

          forbidden_text = [
              "누락된 입력 파일",
              "사용된 입력 파일",
              "data_summary.json",
              "eda_summary.json",
              "stats_summary.json",
              "ml_metrics.json",
          ]
          for text in forbidden_text:
              assert text not in report, f"unexpected JSON input text: {text}"
          PY

      - name: Verify report output
        run: |
          test -f report.md
          test -f logs/report_generation.log
          grep -q "output/seaborn_distribution.png" report.md
          grep -q "output/plotly_group_comparison.html" report.md
