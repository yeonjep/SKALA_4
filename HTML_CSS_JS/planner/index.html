<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKALA 스터디 플래너</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <h1 class="logo">SKALA 스터디 플래너</h1>
        <p class="today" id="today"></p>
      </div>
      <button type="button" id="theme-toggle" class="theme-toggle">
        다크모드
      </button>
    </header>

    <main class="container">
      <!-- ① 학습 목표 추가 -->
      <section class="panel">
        <h2 class="panel-title">학습 목표 추가</h2>
        <form id="goal-form" class="goal-form">
          <div class="form-row">
            <label for="goal-title" class="sr-only">목표 제목</label>
            <input
              type="text"
              id="goal-title"
              class="form-input"
              placeholder="오늘의 학습 목표를 입력하세요"
              autocomplete="off"
              required
            />

            <label for="goal-category" class="sr-only">분류</label>
            <select id="goal-category" class="form-input form-select">
              <option value="HTML">HTML</option>
              <option value="CSS">CSS</option>
              <option value="JS">JS</option>
            </select>

            <label for="goal-due" class="sr-only">마감일</label>
            <input
              type="date"
              id="goal-due"
              class="form-input form-date"
              required
            />

            <button type="submit" class="btn btn-primary">추가</button>
          </div>
        </form>
      </section>

      <!-- ② 학습 목록 -->
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title">학습 목록</h2>
          <div class="tabs" id="filter-tabs">
            <button type="button" class="tab is-active" data-filter="all">
              전체
            </button>
            <button type="button" class="tab" data-filter="active">
              진행중
            </button>
            <button type="button" class="tab" data-filter="done">완료</button>
          </div>
        </div>

        <div class="search-row">
          <label for="goal-search" class="sr-only">목표 검색</label>
          <input
            type="text"
            id="goal-search"
            class="form-input"
            placeholder="목표 검색하기"
            autocomplete="off"
          />
        </div>

        <div class="sort-row" id="sort-controls">
          <span class="sort-label">정렬</span>
          <button type="button" class="sort-btn is-active" data-sort="default">
            기본
          </button>
          <button type="button" class="sort-btn" data-sort="due">
            마감임박순
          </button>
          <button type="button" class="sort-btn" data-sort="latest">
            최신순
          </button>
        </div>

        <ul id="goal-list" class="goal-list"></ul>

        <div class="list-empty" id="list-empty" hidden>
          <p class="list-empty-title">아직 등록된 목표가 없어요.</p>
          <p class="list-empty-desc">예: "HTML 시맨틱 태그 복습하기"</p>
        </div>

        <div class="progress">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">0 / 0 완료 (0%)</p>
        </div>

        <p class="summary" id="category-summary"></p>
      </section>

      <!-- ③ 오늘의 팁 -->
      <section class="panel">
        <h2 class="panel-title">오늘의 팁</h2>
        <p class="tip" id="tip-text">불러오는 중...</p>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2026 SKALA 스터디 플래너</p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
